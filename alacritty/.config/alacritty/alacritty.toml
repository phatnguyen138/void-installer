[general]
live_config_reload = true

[window]
padding = { x = 10, y = 8 }
dynamic_padding = true
opacity = 0.96
decorations = "None"
dynamic_title = false

[font]
size = 11.0
normal = { family = "JetBrainsMono Nerd Font Mono", style = "Regular" }
bold = { family = "JetBrainsMono Nerd Font Mono", style = "Bold" }
italic = { family = "JetBrainsMono Nerd Font Mono", style = "Italic" }

[colors.primary]
foreground = "#cad3f5"
background = "#24273a"

[colors.cursor]
text = "#24273a"
cursor = "#f4dbd6"

[colors.selection]
text = "#24273a"
background = "#f4dbd6"

[colors.normal]
black = "#494d64"
red = "#ed8796"
green = "#a6da95"
yellow = "#eed49f"
blue = "#8aadf4"
magenta = "#f5bde6"
cyan = "#8bd5ca"
white = "#b8c0e0"

[colors.bright]
black = "#5b6078"
red = "#ed8796"
green = "#a6da95"
yellow = "#eed49f"
blue = "#8aadf4"
magenta = "#f5bde6"
cyan = "#8bd5ca"
white = "#a5adcb"

[colors.dim]
black = "#363a4f"
red = "#ed8796"
green = "#a6da95"
yellow = "#eed49f"
blue = "#8aadf4"
magenta = "#f5bde6"
cyan = "#8bd5ca"
white = "#b8c0e0"

[cursor]
blink_interval = 500
unfocused_hollow = true

[cursor.style]
shape = "Beam"
blinking = "On"

[scrolling]
history = 10000
multiplier = 3

[mouse]
hide_when_typing = true

[bell]
duration = 0

[[keyboard.bindings]]
key = "J"
mods = "Alt"
chars = "\u001b[B"

[[keyboard.bindings]]
key = "K"
mods = "Alt"
chars = "\u001b[A"

[[keyboard.bindings]]
key = "H"
mods = "Alt"
chars = "\u001b[1;3D"

[[keyboard.bindings]]
key = "L"
mods = "Alt"
chars = "\u001b[1;3C"

[[keyboard.bindings]]
key = "G"
mods = "Alt"
chars = "\u001b[D"

[[keyboard.bindings]]
key = "Semicolon"
mods = "Alt"
chars = "\u001b[C"
